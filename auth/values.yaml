microservices:
  - name: auth
    image:
      repository: mohamedaziz599/auth
      tag: 117
    port: 3000
    env:
      - name: MONGO_URI
        value: mongodb://mongodb:27017/auth

  - name: client
    image:
      repository: mohamedaziz599/client
      tag: 117
    port: 3001
    env:
      - name: MONGO_URI
        value: mongodb://mongodb:27017/client

  - name: orders
    image:
      repository: mohamedaziz599/orders
      tag: 117
    port: 3002
    env:
      - name: MONGO_URI
        value: mongodb://mongodb:27017/orders

  - name: payments
    image:
      repository: mohamedaziz599/payments
      tag: 117
    port: 3003
    env:
      - name: MONGO_URI
        value: mongodb://mongodb:27017/payments

  - name: tickets
    image:
      repository: mohamedaziz599/tickets
      tag: 117
    port: 3004
    env:
      - name: MONGO_URI
        value: mongodb://mongodb:27017/tickets

  - name: expiration
    image:
      repository: mohamedaziz599/expiration
      tag: 117
    port: 3005
    env:
      - name: MONGO_URI
        value: mongodb://mongodb:27017/expiration
      - name: RABBITMQ_URL
        value: amqp://guest:guest@rabbitmq:5672

rabbitmq:
  enabled: true
  image: rabbitmq:3-management
  port: 5672
  managementPort: 15672

mongodb:
  enabled: true
  image: mongo:6
  port: 27017
