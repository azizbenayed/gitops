microservices:
  - name: auth
    image:
      repository: mohamedaziz599/auth
      tag: 113
    port: 3000

  - name: client
    image:
      repository: mohamedaziz599/client
      tag: 113
    port: 3001

  - name: orders
    image:
      repository: mohamedaziz599/orders
      tag: 113
    port: 3002

  - name: payments
    image:
      repository: mohamedaziz599/payments
      tag: 113
    port: 3003

  - name: tickets
    image:
      repository: mohamedaziz599/tickets
      tag: 113
    port: 3004

  - name: expiration
    image:
      repository: mohamedaziz599/expiration
      tag: 113
    port: 3005
    env:
    - name: RABBITMQ_URL
      value: amqp://guest:guest@rabbitmq:5672
rabbitmq:
  enabled: true
  image: rabbitmq:3-management
  port: 5672
  managementPort: 15672
mongodb:
  enabled: true
  image: mongo:6
  port: 27017
