{{- range .Values.microservices }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      containers:
        - name: {{ .name }}
          image: {{ .image.repository }}:{{ .image.tag }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .port }}

          {{- if .env }}
          env:
{{ toYaml .env | nindent 12 }}
          {{- end }}

---
{{- end }}
