apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nodeapp-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx  

  rules:
    - host: nodeapp.local
    - http:
        paths:

          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 80

          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: orders
                port:
                  number: 80

          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: payments
                port:
                  number: 80

          - path: /api/tickets
            pathType: Prefix
            backend:
              service:
                name: tickets
                port:
                  number: 80

          - path: /
            pathType: Prefix
            backend:
              service:
                name: client
                port:
                  number: 80
